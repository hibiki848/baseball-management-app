<!doctype html><html lang="ja"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>投球入力</title><link rel="stylesheet" href="css/style.css"/></head>
<body data-page="games"><div class="app"><header><h1>投球入力</h1></header><main>
<form id="pitchingForm" class="card">
<div class="form-row"><label>投手選択</label><select id="pitcherSelect" name="pitcher"></select></div>
<div class="form-row"><label>登板イニング</label><input name="inning" placeholder="例: 1-6" required/></div>
<div class="form-row"><label>打者数</label><input name="batters" type="number" min="0" required/></div>
<div class="form-row"><label>投球数</label><input name="pitches" type="number" min="0" required/></div>
<div class="form-row"><label>被安打</label><input name="h" type="number" min="0"/></div>
<div class="form-row"><label>奪三振</label><input name="so" type="number" min="0"/></div>
<div class="form-row"><label>四球</label><input name="bb" type="number" min="0"/></div>
<div class="form-row"><label>死球</label><input name="hbp" type="number" min="0"/></div>
<div class="form-row"><label>失点</label><input name="r" type="number" min="0"/></div>
<div class="form-row"><label>自責点</label><input name="er" type="number" min="0"/></div>
<div class="form-row"><label>最速球速</label><input name="maxV" type="number" min="0"/></div>
<div class="form-row"><label>平均球速</label><input name="avgV" type="number" min="0"/></div>
<button class="button-primary" type="submit">保存</button><div id="pitchingMessage" class="notice"></div>
</form></main><nav class="bottom-nav"><a href="index.html" data-page="home">ホーム</a><a href="players.html" data-page="players">選手</a><a href="games.html" data-page="games">試合</a><a href="condition.html" data-page="condition">体調</a><a href="settings.html" data-page="settings">設定</a></nav></div>
<script src="js/analysis.js"></script><script src="js/main.js"></script></body></html>
