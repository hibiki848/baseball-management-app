<!doctype html><html lang="ja"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>打席入力</title><link rel="stylesheet" href="css/style.css"/></head>
<body data-page="games"><div class="app"><header><h1>打席入力（高速入力）</h1></header><main>
<form id="battingForm" class="card">
<div class="form-row"><label>1. 打者選択</label><select id="batterSelect" name="batter"></select></div>
<div class="form-row"><label>2. 打順選択</label><select name="order"> <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option></select></div>
<div class="form-row"><label>3. 投手左右選択</label><div class="segmented" data-target="pitcherHand"><button type="button" class="chip" data-value="右">右</button><button type="button" class="chip" data-value="左">左</button><button type="button" class="chip" data-value="不明">不明</button></div><input id="pitcherHand" name="pitcherHand" type="hidden"/></div>
<div class="form-row"><label>4. 球種選択</label><select name="pitchType"><option>ストレート</option><option>スライダー</option><option>カーブ</option><option>フォーク</option><option>チェンジアップ</option></select></div>
<div class="form-row"><label>5. コース選択</label><select name="course"><option>内角高め</option><option>内角低め</option><option>真ん中</option><option>外角高め</option><option>外角低め</option></select></div>
<div class="form-row"><label>6. 結果選択</label><select name="result"><option>安打</option><option>二塁打</option><option>三塁打</option><option>本塁打</option><option>四球</option><option>三振</option><option>凡打</option></select></div>
<div class="form-row"><label>7. 打球方向選択</label><select name="direction"><option>左翼</option><option>中堅</option><option>右翼</option><option>三塁線</option><option>遊撃</option><option>二塁</option><option>一塁線</option></select></div>
<div class="form-row"><label>備考（任意）</label><input name="note" placeholder="任意"/></div>
<button type="submit" class="button-primary">8. 保存</button><div id="battingMessage" class="notice"></div>
</form>
</main><nav class="bottom-nav"><a href="index.html" data-page="home">ホーム</a><a href="players.html" data-page="players">選手</a><a href="games.html" data-page="games">試合</a><a href="condition.html" data-page="condition">体調</a><a href="settings.html" data-page="settings">設定</a></nav></div>
<script src="js/data.js"></script><script src="js/analysis.js"></script><script src="js/main.js"></script></body></html>
