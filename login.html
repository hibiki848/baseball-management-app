<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ログイン | 野球管理アプリ</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="login">
  <div class="login-wrap">
    <div class="card">
      <h1>野球管理アプリ</h1>
      <p class="small">メールアドレスとパスワードでログイン、または新規登録してください</p>

      <div class="auth-tabs" role="tablist" aria-label="認証タブ">
        <button type="button" id="loginTab" class="auth-tab active" data-auth-tab="login" role="tab" aria-selected="true" aria-controls="loginPanel">ログイン</button>
        <button type="button" id="registerTab" class="auth-tab" data-auth-tab="register" role="tab" aria-selected="false" aria-controls="registerPanel">新規登録</button>
      </div>

      <section id="loginPanel" class="auth-panel active" data-auth-panel="login" role="tabpanel" aria-labelledby="loginTab">
        <form id="loginForm">
          <div class="form-row"><label for="loginEmail">メールアドレス</label><input id="loginEmail" name="email" type="email" required placeholder="coach@example.com" /></div>
          <div class="form-row"><label for="loginPassword">パスワード</label><input id="loginPassword" name="password" type="password" required placeholder="••••••••" /></div>

          <fieldset class="form-row role-select-group">
            <legend>ログインロール</legend>
            <label class="role-option"><input type="radio" name="role" value="coach" required />監督</label>
            <label class="role-option"><input type="radio" name="role" value="manager" />マネージャー</label>
            <label class="role-option"><input type="radio" name="role" value="player" />選手</label>
          </fieldset>

          <button class="button-primary" type="submit">ログイン</button>
        </form>
      </section>

      <section id="registerPanel" class="auth-panel hidden" data-auth-panel="register" role="tabpanel" aria-labelledby="registerTab" hidden>
        <form id="registerForm">
          <div class="form-row"><label for="registerName">表示名</label><input id="registerName" name="name" type="text" required placeholder="山田 太郎" /></div>
          <div class="form-row"><label for="registerEmail">メールアドレス</label><input id="registerEmail" name="email" type="email" required placeholder="coach@example.com" /></div>
          <div class="form-row">
            <label for="registerRole">ロール</label>
            <select id="registerRole" name="role" required>
              <option value="" selected>選択してください</option>
              <option value="player">選手</option>
              <option value="coach">監督</option>
              <option value="manager">マネージャー</option>
            </select>
          </div>
          <div class="form-row" id="registerGradeRow" hidden>
            <label for="registerGrade">学年</label>
            <select id="registerGrade" name="grade" disabled>
              <option value="">未設定</option>
              <option value="1年">1年</option>
              <option value="2年">2年</option>
              <option value="3年">3年</option>
            </select>
          </div>
          <div class="form-row"><label for="registerPassword">パスワード</label><input id="registerPassword" name="password" type="password" minlength="8" required placeholder="8文字以上" /></div>
          <div class="form-row"><label for="registerPasswordConfirm">パスワード（確認）</label><input id="registerPasswordConfirm" name="passwordConfirm" type="password" minlength="8" required placeholder="確認用パスワード" /></div>
          <button class="button-primary" type="submit">新規登録</button>
        </form>
      </section>

      <p id="authMessage" class="auth-message" role="status" aria-live="polite"></p>
    </div>
  </div>
  <script src="js/roles.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
