<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ログイン | 野球管理アプリ</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="login">
  <div class="login-wrap">
    <div class="card">
      <h1>野球管理アプリ</h1>
      <p class="small">メールアドレスとパスワードでログインしてください</p>
      <form id="loginForm">
        <div class="form-row"><label>メールアドレス</label><input type="email" required placeholder="coach@example.com" /></div>
        <div class="form-row"><label>パスワード</label><input type="password" required placeholder="••••••••" /></div>
        <button class="button-primary" type="submit">ログイン</button>
      </form>
    </div>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
