<!doctype html><html lang="ja"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>設定</title><link rel="stylesheet" href="css/style.css"/></head>
<body data-page="settings"><div class="app"><header><h1>設定</h1></header><main id="settingsRoot">
<div class="card"><h2>プロフィール</h2><div id="profileName"></div><div class="small">権限: <span id="profileRole"></span></div><div class="small">チーム: <span id="profileTeam"></span></div><div class="small">学年: <span id="profileGrade">学年未設定</span></div></div>
<div class="card" id="gradeSettingsCard" hidden><h2>学年設定</h2><form id="gradeForm"><div class="form-row"><label for="gradeSelect">学年</label><select id="gradeSelect" name="grade"><option value="">未設定</option><option value="1年">1年</option><option value="2年">2年</option><option value="3年">3年</option><option value="その他">その他</option></select></div><button class="button-primary" type="submit">学年を保存</button></form><div id="gradeMessage" class="small"></div></div>
<div class="card"><h2>メールアドレス変更</h2><form id="emailForm"><div class="form-row"><label for="newEmail">新しいメールアドレス</label><input id="newEmail" name="newEmail" type="email" placeholder="new@example.com"/></div><button class="button-primary" type="submit">メールアドレスを変更</button></form><div id="emailMessage" class="small"></div></div>
<div class="card"><h2>パスワード変更</h2><form id="passwordForm"><div class="form-row"><label for="currentPassword">現在のパスワード</label><input id="currentPassword" name="currentPassword" type="password" autocomplete="current-password"/></div><div class="form-row"><label for="newPassword">新しいパスワード</label><input id="newPassword" name="newPassword" type="password" minlength="8" autocomplete="new-password"/></div><button class="button-primary" type="submit">パスワードを変更</button></form><div id="passwordMessage" class="small"></div></div>
<div class="card danger-zone"><h2>アカウント削除</h2><p class="small">この操作は取り消せません。実行するとアカウント情報と関連データが削除されます。</p><div class="form-row"><label for="deleteConfirmText">確認テキスト</label><input id="deleteConfirmText" type="text" placeholder="削除する" autocomplete="off"/></div><div class="form-row"><label for="deleteAccountPassword">パスワード再入力</label><input id="deleteAccountPassword" type="password" placeholder="現在のパスワード" autocomplete="current-password"/></div><div id="accountDeleteMessage" class="small"></div><button id="deleteAccountBtn" class="button-danger">アカウント削除</button></div>
<div class="card"><button id="logoutBtn" class="button-primary">ログアウト</button></div>
</main><nav class="bottom-nav"><a href="index.html" data-page="home">ホーム</a><a href="games.html" data-page="games">試合</a><a href="condition.html" data-page="condition">入力</a><a href="condition-check.html" data-page="condition-health">体調</a><a href="prepare.html" data-page="prepare">試合準備</a><a href="settings.html" data-page="settings">設定</a></nav></div>
<script src="js/analysis.js"></script><script src="js/roles.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/main.js"></script></body></html>
