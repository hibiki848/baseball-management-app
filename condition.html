<!doctype html><html lang="ja"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>体調</title><link rel="stylesheet" href="css/style.css"/></head>
<body data-page="condition"><div class="app"><header><h1 id="conditionPageTitle">コンディション入力</h1></header><main id="conditionRoot">
<form id="conditionForm" class="card">
<input type="hidden" name="playerName"/>
<div class="form-row"><label>日付</label><input type="date" name="date" required/></div>
<div class="form-row"><label>体重(kg)</label><input type="number" step="0.1" name="weight"/></div>
<div class="form-row"><label>体脂肪率(%)</label><input type="number" step="0.1" name="bodyFat"/></div>
<div class="form-row"><label>睡眠時間(h)</label><select name="sleep"><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option></select></div>
<div class="form-row"><label>疲労度(5段階)</label><select name="fatigue"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></div>
<div class="form-row"><label>体調(5段階)</label><select name="health"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></div>
<div class="form-row"><label>痛みの有無</label><select name="pain"><option>なし</option><option>あり</option></select></div>
<div class="form-row"><label>痛み部位</label><select name="painArea"><option>なし</option><option>肩</option><option>肘</option><option>腰</option><option>膝</option></select></div>
<div class="form-row"><label>メモ</label><textarea name="memo" placeholder="任意"></textarea></div>
<button class="button-primary" type="submit">保存</button><div id="conditionMessage" class="notice"></div>
</form></main><nav class="bottom-nav"><a href="index.html" data-page="home">ホーム</a><a href="games.html" data-page="games">試合</a><a href="condition.html" data-page="condition">体調</a><a href="settings.html" data-page="settings">設定</a></nav></div>
<script src="js/analysis.js"></script><script src="js/main.js"></script></body></html>
