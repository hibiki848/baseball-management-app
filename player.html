<!doctype html>
<html lang="ja"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>選手ページ</title><link rel="stylesheet" href="css/style.css"/></head>
<body data-page="player" data-role-page="player"><div class="app"><header><h1>選手ページ</h1></header><main>
<div class="card role-hero"><h2>選手ダッシュボード</h2><div class="small">個人の入力・確認・振り返り機能を拡張していく基盤画面です。</div></div>
<div class="role-grid">
  <div class="card"><h3>今日のコンディション</h3><div class="small">今後機能追加予定</div></div>
  <div class="card"><h3>個人成績</h3><div class="small">今後機能追加予定</div></div>
  <div class="card"><h3>課題メモ</h3><div class="small">今後機能追加予定</div></div>
  <div class="card"><h3>次回予定</h3><div class="small">今後機能追加予定</div></div>
</div>
<div class="card danger-zone"><h2>アカウント削除</h2><p class="small">この操作は取り消せません。実行するとアカウント情報と関連データが削除されます。</p><div class="form-row"><label for="deleteConfirmText">確認テキスト</label><input id="deleteConfirmText" type="text" placeholder="削除する" autocomplete="off"/></div><div class="form-row"><label for="deleteAccountPassword">パスワード再入力</label><input id="deleteAccountPassword" type="password" placeholder="現在のパスワード" autocomplete="current-password"/></div><div id="accountDeleteMessage" class="small"></div><button id="deleteAccountBtn" class="button-danger">アカウント削除</button></div>
</main></div><script src="js/main.js"></script></body></html>
